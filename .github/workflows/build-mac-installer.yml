name: Build Mac Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-mac:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Print build environment
        run: |
          node --version
          npm --version
          pwd
          ls -la
          test -f package.json
          test -f package-lock.json
          test -f electron/main.cjs
          test -f index.html

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build macOS DMG and ZIP
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never

      - name: Show dist folder
        if: always()
        run: |
          if [ -d dist ]; then
            find dist -maxdepth 2 -type f -print -exec ls -lh {} \;
          else
            echo "No dist folder was created."
          fi

      - name: Pack macOS artifacts
        run: |
          test -d dist
          mkdir -p artifacts
          find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.yml" -o -name "*.blockmap" \) -print > artifact-list.txt
          if [ ! -s artifact-list.txt ]; then
            echo "No macOS build artifacts found in dist."
            exit 1
          fi
          zip -j "artifacts/spectreverse-mac-${{ matrix.arch }}.zip" $(cat artifact-list.txt)

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: spectreverse-mac-${{ matrix.arch }}
          path: artifacts/spectreverse-mac-${{ matrix.arch }}.zip
          if-no-files-found: error
